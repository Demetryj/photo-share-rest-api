<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Reset your password</title>
  </head>
  <body>
    <p>Hi {{username}},</p>
    <p>We received a request to reset your password.</p>
    <p>Please click the following link to continue with password reset:</p>
    <p>
      <a href="{{host}}api/auth/password-reset/verify/{{token}}">Reset password</a>
    </p>
    <p>If you did not request a password reset, please ignore this email.</p>
    <p>Thanks,</p>
    <p>Our Team</p>
  </body>
</html>
