services:
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"

  # Active variant:
  # - db has healthcheck
  # - fastapi starts only after db is healthy
  # This replaces run.sh orchestration inside the container.
  db:
    image: postgres:16
    container_name: postgres_server
    restart: always
    environment:
      POSTGRES_USER: ${PSG_DB_USER}
      POSTGRES_PASSWORD: ${PSG_DB_PASSWORD}
      POSTGRES_DB: ${PSG_DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PSG_DB_USER} -d ${PSG_DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 20

  # If the migration file already exists in src/migrations/versions
  migrate:
    build: .
    env_file: .env
    volumes:
      - ./:/app
      - /app/.venv
    depends_on:
      db:
        condition: service_healthy
    command: ["poetry", "run", "alembic", "upgrade", "heads"]

  app_server:
    build: .
    env_file: .env
    volumes:
      - ./:/app
      - /app/.venv
    depends_on:
      db:
        condition: service_healthy
        # If the migration file already exists in src/migrations/versions
      # migrate:
      #   condition: service_completed_successfully
      redis:
        condition: service_started
    command:
      [
        "poetry",
        "run",
        "uvicorn",
        "main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
    ports:
      - "8000:8000"

volumes:
  postgres_data:
